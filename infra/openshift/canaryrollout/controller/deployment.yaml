apiVersion: apps/v1
kind: Deployment
metadata:
  name: canaryrollout-controller
  namespace: team-a
  labels:
    app.kubernetes.io/name: canaryrollout-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: canaryrollout-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: canaryrollout-controller
    spec:
      serviceAccountName: canaryrollout-controller
      containers:
        - name: controller
          image: ghcr.io/adrianbp/canaryrollout-controller:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/app/controller.sh"]
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ROUTE_AUTOMATION_DIR
              value: "/app/route-automation"
            - name: POLL_INTERVAL_SECONDS
              value: "15"
            - name: DEFAULT_MIN_CANARY_REPLICAS
              value: "1"
            - name: DEFAULT_PROMOTE_CANARY_BASELINE_REPLICAS
              value: "0"
            - name: DEFAULT_DISABLE_DELETE_PRIMARY
              value: "true"
            - name: DEFAULT_DISABLE_SHIFT_STEP
              value: "25"
            - name: DEFAULT_DISABLE_WAIT_SECONDS
              value: "20"
            - name: EVENTS_ENABLED
              value: "true"
            - name: MAX_STATUS_MESSAGE_LEN
              value: "700"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
