apiVersion: v1
kind: ServiceAccount
metadata:
  name: canaryrollout-controller
  namespace: team-a
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: canaryrollout-controller
  namespace: team-a
rules:
  - apiGroups: ["canary.company.io"]
    resources: ["canaryrollouts"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["canary.company.io"]
    resources: ["canaryrollouts/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: canaryrollout-controller
  namespace: team-a
subjects:
  - kind: ServiceAccount
    name: canaryrollout-controller
    namespace: team-a
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: canaryrollout-controller
