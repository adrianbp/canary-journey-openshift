apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: flagger-nginx-dev
  region: us-east-1
  version: "1.29"

iam:
  withOIDC: true

managedNodeGroups:
  - name: main-ng
    instanceType: t3.medium
    desiredCapacity: 3
    minSize: 3
    maxSize: 6
    volumeSize: 80
    privateNetworking: false

cloudWatch:
  clusterLogging:
    enableTypes: ["*"]
