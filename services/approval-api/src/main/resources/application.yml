server:
  port: 8081

spring:
  application:
    name: approval-api
  datasource:
    url: jdbc:postgresql://localhost:5432/canary
    username: canary
    password: canary
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
