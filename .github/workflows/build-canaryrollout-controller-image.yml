name: Build CanaryRollout Controller Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag"
        required: true
        default: "0.1.0"
  push:
    branches:
      - codex/poc-plan-a-openshift-route
    paths:
      - "infra/openshift/canaryrollout/controller/**"
      - "infra/openshift/route-automation/**"
      - ".github/workflows/build-canaryrollout-controller-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/canaryrollout-controller
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/openshift/canaryrollout/controller/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_REPO }}:latest

      - name: Print image reference
        run: |
          echo "Published: $IMAGE_REPO:${{ steps.meta.outputs.tag }}"
