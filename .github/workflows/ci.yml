name: ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  services:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn -T 1C clean verify

      - name: Build images (placeholder)
        run: |
          echo "Build/push approval-api image"
          echo "Build/push manual-gate-webhook image"

      - name: Security scan and SBOM (placeholder)
        run: |
          echo "Run Trivy/Grype"
          echo "Generate SBOM"

  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint charts
        run: |
          helm lint charts/platform-canary-core
          helm lint charts/canary-library

      - name: Package charts
        run: |
          mkdir -p dist/charts
          helm package charts/platform-canary-core -d dist/charts
          helm package charts/canary-library -d dist/charts

      - name: Publish OCI charts (placeholder)
        run: echo "Publish charts to OCI registry"
