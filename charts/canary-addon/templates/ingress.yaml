{{- if and .Values.canary.enabled (eq .Values.canary.provider "ingress") .Values.traffic.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.app.namespace }}
  labels:
{{ include "canary-addon.labels" . | indent 4 }}
spec:
  ingressClassName: {{ .Values.traffic.ingress.className }}
  rules:
    - host: {{ .Values.traffic.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.primary.serviceName }}
                port:
                  number: 80
{{- end }}
