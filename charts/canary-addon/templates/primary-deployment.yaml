{{- if and .Values.canary.enabled .Values.primary.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.primary.deploymentName }}
  namespace: {{ .Values.app.namespace }}
  labels:
{{ include "canary-addon.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.primary.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.primary.deploymentName }}
  template:
    metadata:
      labels:
        app: {{ .Values.primary.deploymentName }}
    spec:
      # This addon manages the primary object only. Application container spec
      # should be patched/synced from canary by automation when promoting.
      containers:
        - name: placeholder
          image: registry.k8s.io/pause:3.10
{{- end }}
