{{- if .Values.previewIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.serviceName }}-preview
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.previewIngress.className | quote }}
    nginx.ingress.kubernetes.io/whitelist-source-range: {{ join "," .Values.previewIngress.officeCidrs | quote }}
    canary.company.io/preview-expire-at: {{ .Values.previewIngress.expireAt | quote }}
spec:
  rules:
    - host: {{ .Values.previewIngress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.serviceName }}-canary
                port:
                  number: {{ .Values.servicePort }}
{{- end }}
